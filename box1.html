<!DOCTYPE html>
<html lang="en"
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:300px;
            height:300px;
            border: 1px solid;
        }
        .sbox{
            width: 100px;
            height: 100px;
        }
        #red{
            background-color: red;
        }
        #green{
            background-color: green;
        }
        #blue{
            background-color: blue;
        }
    </style>
</head>
<body>
    <div class="box">
    <div class="sbox"id ="red"></div>
    <div class="sbox"id="green"></div>
    <div class="sbox"id="blue"></div>

    </div>
</body>
</html>
